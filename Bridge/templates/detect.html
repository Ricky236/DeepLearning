{% extends "layout.html" %}
{% block head %}
  <link rel="stylesheet" href="/static/css/style.css"/>
{% endblock %}
{% block content %}
  <div class="page-realtime page-monitor">
  <div class="grid12" style="margin-bottom:20px">
    <div class="card" style="grid-column:span 4;min-height:520px">
      <div class="card-head" style="justify-content:space-between">
        <div class="card-title">摄像头</div>
        <button class="btn btn-primary" id="btnAddCamera" type="button">添加</button>
      </div>
      <div class="table-wrap" style="margin-top:12px;max-height:420px">
        <table>
          <thead><tr><th>名称</th><th>协议</th><th>状态</th></tr></thead>
          <tbody id="camBody"></tbody>
        </table>
      </div>
      <div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline" id="btnEditCamera" type="button">编辑</button>
        <button class="btn btn-outline" id="btnDeleteCamera" type="button">删除</button>
      </div>
    </div>

    <div class="card" style="grid-column:span 8;min-height:520px">
      <div class="card-head" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div class="card-title">实时画面 / 检测</div>
          <div style="color:var(--text2);font-size:13px;margin-top:4px" id="activeCamMeta">未选择摄像头</div>
        </div>
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <button class="btn" id="btnStartMonitor" type="button">开始监控</button>
          <button class="btn" id="btnStopMonitor" type="button">停止监控</button>
          <button class="btn btn-primary" id="btnStartDetect" type="button">开始检测</button>
          <button class="btn btn-primary" id="btnStopDetect" type="button">停止检测</button>
        </div>
      </div>

      <div style="height:420px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--muted);display:flex;flex-direction:column">
        <div class="row" style="padding:10px 12px;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center">
          <button class="btn btn-primary" type="button" id="btnOpenLocalCam">打开摄像头</button>
          <button class="btn" type="button" id="btnCloseLocalCam" disabled>关闭摄像头</button>
          <span style="color:var(--text2);font-size:13px" id="localCamStatus">未启动</span>
        </div>
        <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative">
          <video id="localPreview" autoplay playsinline muted style="max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;display:none;background:#000"></video>
          <div id="localCamPlaceholder" style="text-align:center;color:var(--text2);padding:24px;max-width:480px;line-height:1.6">
            点击「打开摄像头」使用
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div class="card-title">监测记录</div>
      </div>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline" id="btnRefreshRecords" type="button">刷新</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="det-table">
        <thead><tr><th>时间</th><th>摄像头</th><th>事件</th><th>详情</th></tr></thead>
        <tbody id="recBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card" id="camFormCard" style="display:none;margin-top:16px">
    <div class="card-head" style="justify-content:space-between">
      <div class="card-title" id="camFormTitle">添加摄像头</div>
      <button class="btn" id="btnCloseCamForm" type="button">关闭</button>
    </div>
    <div class="row" style="gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:240px">
        <div style="color:var(--text2);font-size:13px;margin-bottom:6px">名称</div>
        <input class="input" id="camName" placeholder="例如：桥下 1 号"/>
      </div>
      <div style="flex:2;min-width:320px">
        <div style="color:var(--text2);font-size:13px;margin-bottom:6px">流地址（RTSP/RTMP/WebRTC 等）</div>
        <input class="input" id="camUrl" placeholder="例如：rtsp://user:pass@ip/stream"/>
      </div>
      <div style="width:160px">
        <div style="color:var(--text2);font-size:13px;margin-bottom:6px">协议</div>
        <select class="select" id="camProtocol">
          <option value="RTSP">RTSP</option>
          <option value="RTMP">RTMP</option>
          <option value="WebRTC">WebRTC</option>
          <option value="">其他</option>
        </select>
      </div>
      <div class="row" style="align-items:flex-end;gap:8px">
        <button class="btn btn-primary" id="btnSaveCam" type="button">保存</button>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="/static/js/realtime.js"></script>
{% endblock %}
