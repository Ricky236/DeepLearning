{% extends "layout.html" %}
{% block head %}
  <style>
    /* 覆盖全局 .card 的 min-height:200px，避免「仅一行工具栏」的卡片被撑出大块空白 */
    .page-profile .card{min-height:0;padding:18px 20px}
    .page-profile .card + .card{margin-top:0}
    .profile-user-card .profile-user-layout{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
    .profile-avatar-wrap{
      width:88px;height:88px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:1.85rem;font-weight:600;color:#fff;letter-spacing:0.02em;
      box-shadow:var(--shadow-whisper, 0 4px 20px rgba(22,24,32,.1));
      border:2px solid var(--border);
      position:relative;overflow:hidden;
    }
    .profile-avatar-img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;
      z-index:1;
    }
    #profileAvatarLetter{position:relative;z-index:0}
    .profile-avatar-col{display:flex;flex-direction:column;align-items:flex-start;gap:0}
    .profile-avatar-actions{margin-top:10px}
    .profile-user-main{flex:1;min-width:min(100%, 280px)}
    .profile-user-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .profile-user-head h2{margin:0;font-family:var(--font-serif);font-size:1.35rem;font-weight:500;color:var(--text)}
    .profile-meta-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 20px;font-size:14px;align-items:baseline}
    .profile-meta-grid dt{margin:0;color:var(--text2);white-space:nowrap}
    .profile-meta-grid dd{margin:0;font-weight:500;color:var(--text);word-break:break-all}
    .profile-guest-nick{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
    .profile-guest-nick .input{max-width:280px}
  </style>
{% endblock %}
{% block content %}
<div class="page-profile">
  <div class="card profile-user-card" style="margin-bottom:12px">
    <div class="profile-user-layout">
      <div class="profile-avatar-col">
        <div class="profile-avatar-wrap" id="profileAvatarWrap" aria-hidden="true">
          <img id="profileAvatarImg" class="profile-avatar-img" alt="" style="display:none"/>
          <span id="profileAvatarLetter">?</span>
        </div>
        <div class="profile-avatar-actions" id="profileAvatarActions" style="display:none">
          <input type="file" id="profileAvatarFile" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" hidden/>
          <div class="row" style="gap:8px;flex-wrap:wrap">
            <button type="button" class="btn btn-outline" id="btnPickAvatar">上传头像</button>
            <button type="button" class="btn" id="btnClearAvatar" style="display:none">恢复默认</button>
          </div>
        </div>
      </div>
      <div class="profile-user-main">
        <div class="profile-user-head">
          <h2 id="profileCardTitle">个人信息</h2>
        </div>
        <dl class="profile-meta-grid" id="profileMetaGrid">
          <dt>昵称</dt><dd id="profileNickname">—</dd>
          <dt>注册时间</dt><dd id="profileCreatedAt">—</dd>
          <dt>用户编号</dt><dd id="profileUserId">—</dd>
        </dl>
        <div class="profile-guest-nick" id="profileGuestNickRow" style="display:none">
          <div style="color:var(--text2);font-size:13px;margin-bottom:8px">访客昵称（仅保存在本机）</div>
          <div class="row" style="gap:8px;flex-wrap:wrap;align-items:center">
            <input id="nickname" class="input" type="text" maxlength="32" placeholder="输入昵称" style="min-width:200px"/>
            <button class="btn btn-primary" id="saveProfileBtn" type="button">保存昵称</button>
            <button class="btn" id="resetProfileBtn" type="button">重置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card profile-toolbar-card" style="margin-bottom:12px">
    <div class="row" style="justify-content:space-between;margin:0">
      <div class="row">
        <input id="keyword" class="input" style="width:320px" placeholder="关键词（病害/模型）"/>
        <select id="range" class="select">
          <option value="all">全部</option>
          <option value="7">最近 7 天</option>
          <option value="30">最近 30 天</option>
        </select>
        <button class="btn btn-primary" id="refreshBtn" type="button">刷新</button>
      </div>
      <div class="row">
        <button class="btn" id="exportJsonBtn" type="button">导出 JSON</button>
        <button class="btn" id="exportCsvBtn" type="button">导出 CSV</button>
        <button class="btn" id="clearHistoryBtn" type="button" style="border-color:#ef4444;color:#ef4444">清空历史</button>
      </div>
    </div>
  </div>

  <div class="card profile-history-card">
    <div class="card-head" style="margin-bottom:10px"><div class="card-title">历史检测记录</div></div>
    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th>时间</th><th>模型版本</th><th>病害统计</th><th>总数</th><th>推理耗时</th><th>查看</th>
        </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
  <script src="/static/js/profile.js"></script>
{% endblock %}
